<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pizzas — la carte de Marc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --nuit:#1B1A16;
    --ivoire:#F4EFE5;
    --ivoire-doux:#EAE3D5;
    --or:#B4914E;
    --olive:#5A6349;
    --gris:#8C8677;

    --serif:"Cormorant Garamond", Georgia, serif;
    --sans:"Jost", system-ui, sans-serif;

    /* Photos d'ambiance — Unsplash (licence libre) */
    --img-ouverture:url("https://images.unsplash.com/photo-1574071318508-1cdbab80d002?auto=format&fit=crop&w=2000&q=70");
    --img-basilic:url("https://images.unsplash.com/photo-1598023696416-0193a0bcd302?auto=format&fit=crop&w=2000&q=70");
    --img-pate:url("https://images.unsplash.com/photo-1537734796389-e1fc293cf856?auto=format&fit=crop&w=2000&q=70");
  }

  *{box-sizing:border-box;margin:0;padding:0}

  body{
    background:var(--ivoire);
    color:var(--nuit);
    font-family:var(--sans);
    font-weight:300;
    font-size:16px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  :focus-visible{outline:1px solid var(--or);outline-offset:3px}

  .enveloppe{max-width:820px;margin:0 auto;padding:0 28px}

  /* ---------- Barre ---------- */
  .barre{
    position:sticky;
    top:0;
    z-index:20;
    background:rgba(244,239,229,.94);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(27,26,22,.12);
  }
  .barre-int{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    max-width:1040px;
    margin:0 auto;
    padding:16px 28px;
  }
  .marque{
    font-family:var(--serif);
    font-size:20px;
    font-weight:500;
    letter-spacing:.28em;
    text-transform:uppercase;
  }
  .onglets{display:flex;gap:26px}
  .onglets a{
    font-size:11px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--gris);
    text-decoration:none;
    padding-bottom:2px;
    border-bottom:1px solid transparent;
    transition:color .25s ease,border-color .25s ease;
  }
  .onglets a:hover,.onglets a.actif{color:var(--nuit);border-color:var(--or)}

  /* ---------- Photos ---------- */
  .photo{
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
  }
  .photo.ouverture{
    height:62vh;
    min-height:340px;
    background-image:var(--img-ouverture);
  }
  .photo.bande{
    height:44vh;
    min-height:280px;
    border-top:1px solid rgba(27,26,22,.12);
    border-bottom:1px solid rgba(27,26,22,.12);
  }
  .photo.basilic{background-image:var(--img-basilic)}
  .photo.pate{background-image:var(--img-pate)}

  /* ---------- En-tête ---------- */
  .entete{
    text-align:center;
    padding:76px 0 66px;
    border-bottom:1px solid rgba(27,26,22,.12);
  }
  .fleuron{
    display:block;
    margin:0 auto 24px;
    width:34px;height:34px;
    color:var(--or);
  }
  .sur-titre{
    font-size:11px;
    letter-spacing:.34em;
    text-transform:uppercase;
    color:var(--gris);
  }
  .titre{
    font-family:var(--serif);
    font-weight:300;
    font-size:clamp(58px,10vw,106px);
    line-height:1;
    letter-spacing:.14em;
    text-transform:uppercase;
    margin:16px 0 18px;
  }
  .devise{
    font-family:var(--serif);
    font-style:italic;
    font-weight:300;
    font-size:22px;
    color:var(--olive);
  }

  /* ---------- Sections ---------- */
  .section{padding:74px 0 34px}

  .tete-section{text-align:center;margin-bottom:54px}
  .tete-section h2{
    font-family:var(--serif);
    font-weight:400;
    font-size:34px;
    letter-spacing:.2em;
    text-transform:uppercase;
  }
  .tete-section p{
    font-family:var(--serif);
    font-style:italic;
    font-size:19px;
    color:var(--gris);
    margin-top:6px;
  }

  /* ---------- Plats ---------- */
  .plat{
    padding:26px 0;
    border-bottom:1px solid rgba(27,26,22,.09);
    opacity:0;
    transform:translateY(10px);
    transition:opacity .6s ease,transform .6s ease;
  }
  .plat.visible{opacity:1;transform:none}
  .plat:last-child{border-bottom:none}

  .plat h3{
    font-family:var(--serif);
    font-weight:500;
    font-size:26px;
    letter-spacing:.14em;
    text-transform:uppercase;
    line-height:1.2;
  }
  .ingredients{
    margin-top:8px;
    font-size:15px;
    color:#4A463D;
  }
  .finition{
    margin-top:8px;
    font-family:var(--serif);
    font-style:italic;
    font-size:17px;
    color:var(--olive);
    display:flex;
    gap:10px;
    align-items:baseline;
  }
  .finition .mention{
    flex:none;
    font-family:var(--sans);
    font-style:normal;
    font-size:9.5px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--or);
    padding-top:3px;
  }
  .doute{color:var(--gris)}
  .doute sup{color:var(--or);font-size:11px}

  /* ---------- Pied ---------- */
  .pied{
    padding:60px 28px 76px;
    text-align:center;
    background:var(--ivoire-doux);
    border-top:1px solid rgba(27,26,22,.12);
  }
  .pied .mot{
    font-family:var(--serif);
    font-style:italic;
    font-size:20px;
    color:var(--gris);
  }
  .pied .signature{
    margin-top:14px;
    font-size:11px;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:var(--nuit);
  }
  .credits{
    margin-top:34px;
    font-size:10px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:rgba(27,26,22,.35);
  }

  @media (max-width:680px){
    .onglets{gap:16px}
    .onglets a{letter-spacing:.14em}
    .marque{font-size:16px;letter-spacing:.2em}
    .photo{background-attachment:scroll}
    .photo.ouverture{height:46vh;min-height:260px}
    .photo.bande{height:32vh;min-height:210px}
    .entete{padding:56px 0 48px}
    .section{padding:54px 0 24px}
    .plat h3{font-size:22px}
  }

  @media (prefers-reduced-motion:reduce){
    .plat{opacity:1;transform:none;transition:none}
  }

  @media print{
    .barre,.photo{display:none}
    body{background:#fff}
    .plat{opacity:1;transform:none;break-inside:avoid}
    .pied{background:none}
  }
</style>
</head>
<body>

<nav class="barre">
  <div class="barre-int">
    <span class="marque">Marc</span>
    <div class="onglets">
      <a href="#tomate">Tomate</a>
      <a href="#creme">Crème</a>
      <a href="#autres">Autres</a>
    </div>
  </div>
</nav>

<div class="photo ouverture" role="img" aria-label="Pizza napolitaine sortie du four"></div>

<header class="entete">
  <svg class="fleuron" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true">
    <circle cx="16" cy="16" r="13"/>
    <circle cx="16" cy="16" r="9.5" stroke-dasharray="2 3"/>
    <circle cx="12.5" cy="13" r="1.4" fill="currentColor" stroke="none"/>
    <circle cx="19.5" cy="14.5" r="1.4" fill="currentColor" stroke="none"/>
    <circle cx="15" cy="19.5" r="1.4" fill="currentColor" stroke="none"/>
  </svg>
  <p class="sur-titre">Le carnet de Marc</p>
  <h1 class="titre">Pizzas</h1>
  <p class="devise">Napolitaines contemporaines</p>
</header>

<main id="carte"></main>

<footer class="pied">
  <p class="mot">Ce qui est écrit en vert arrive après le four.</p>
  <p class="signature">Marc — 13 recettes</p>
  <p class="credits">Photographies : Unsplash</p>
</footer>

<script>
const sections = [
  { id:"tomate", titre:"Base tomate", sous:"Rosse", pizzas:[
    { nom:"Méditerranéenne", four:["Anchois","Ail","Origan"], apres:[] },
    { nom:"Margherita", four:["Mozzarella"], apres:[] },
    { nom:"Regina", four:["Champignons","Jambon","Mozzarella"], apres:[] },
    { nom:"Diavola", four:["Spianata","Olives","Mozzarella","Oignon",{t:"Miel",doute:true}], apres:[] },
    { nom:"Merguez", four:["Merguez","Poivron rouge","Oignon","Emmental"], apres:[] },
    { nom:"Crudo", four:["Scamorza"], apres:["Jambon cru","Roquette","Tomates cerises","Copeaux de parmesan"] },
    { nom:"Championne", note:"Base tomate jaune", four:["Parmigiano","Mozzarella"], apres:["Mozzarella fraîche","Jambon cru","Provolone doux","Basilic","Amandes grillées","Confiture de figue"] }
  ], photo:"basilic" },

  { id:"creme", titre:"Base crème", sous:"Bianche", pizzas:[
    { nom:"Biquette", four:["Fromage de chèvre","Miel"], apres:[] },
    { nom:"Montagnarde", four:["Oignons rouges revenus","Lardons","Reblochon","Poivre"], apres:[] },
    { nom:"3 fromages", four:["Mozzarella","Emmental","Gorgonzola","Persil","Noix","Poivre"], apres:[] },
    { nom:"Mortadella", four:["Mozzarella"], apres:["Mortadelle","Éclats de pistaches","Zeste de citron","Stracciatella"] },
    { nom:"Tartuffa", note:"Crème de truffe", four:["Champignons","Scamorza"], apres:["Persil","Noisettes","Poivre","Huile de truffe"] }
  ], photo:"pate" },

  { id:"autres", titre:"Autres bases", sous:"Fuori dagli schemi", pizzas:[
    { nom:"Cheesy 404", note:"Base ricotta", four:["Mozzarella fior di latte fumée","Gorgonzola","Grana Padano","Huile d'olive"], apres:["Marmellata d'abricot","Amandes toastées effilées","Basilic"] }
  ] }
];

const mot = (i) => typeof i === "string" ? i : `<span class="doute" title="À confirmer">${i.t}<sup>?</sup></span>`;
const liste = (arr) => arr.map(mot).join(", ");

document.getElementById("carte").innerHTML = sections.map(s => `
  <section class="section" id="${s.id}">
    <div class="enveloppe">
      <div class="tete-section">
        <h2>${s.titre}</h2>
        <p>${s.sous}</p>
      </div>
      ${s.pizzas.map(p => `
        <article class="plat">
          <h3>${p.nom}</h3>
          <p class="ingredients">${p.note ? p.note + " — " : ""}${liste(p.four)}</p>
          ${p.apres.length ? `<p class="finition"><span class="mention">Sortie du four</span><span>${liste(p.apres)}</span></p>` : ""}
        </article>
      `).join("")}
    </div>
  </section>
  ${s.photo ? `<div class="photo bande ${s.photo}" role="img" aria-label="Photo d'ambiance"></div>` : ""}
`).join("");

/* Apparition douce */
const obs = new IntersectionObserver((entrees) => {
  entrees.forEach((e, i) => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add("visible"), i * 45);
      obs.unobserve(e.target);
    }
  });
}, { rootMargin: "0px 0px -30px 0px" });
document.querySelectorAll(".plat").forEach(p => obs.observe(p));

/* Onglet actif au défilement */
const liens = [...document.querySelectorAll(".onglets a")];
const obsSection = new IntersectionObserver((entrees) => {
  entrees.forEach(e => {
    if (e.isIntersecting) {
      liens.forEach(l => l.classList.toggle("actif", l.getAttribute("href") === "#" + e.target.id));
    }
  });
}, { rootMargin: "-45% 0px -50% 0px" });
document.querySelectorAll(".section").forEach(s => obsSection.observe(s));
</script>
</body>
</html>
